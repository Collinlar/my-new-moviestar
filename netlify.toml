# Netlify configuration for MuvieStars (Next.js App Router)
# Publish must not be "dist" (legacy Vite). Override any UI setting here.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Search Engine Notification API (legacy Netlify function)
[[redirects]]
  from = "/api/notify-search-engines"
  to = "/.netlify/functions/notify-search-engines"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
