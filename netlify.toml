# Netlify Configuration for Muviestars.com

[build]
  # Build command
  command = "npm run build"
  # Directory to publish
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Dynamic Sitemap - Proxy to Supabase Edge Function
[[redirects]]
  from = "/sitemap.xml"
  to = "https://anjavnuqkkmpsnjmopou.supabase.co/functions/v1/sitemap"
  status = 200
  force = true

# Search Engine Notification API
[[redirects]]
  from = "/api/notify-search-engines"
  to = "/.netlify/functions/notify-search-engines"
  status = 200

# SPA Fallback - Route all requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

